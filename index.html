      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <link id="app-favicon" rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="32x32" media="(prefers-color-scheme: light)" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="32x32" media="(prefers-color-scheme: dark)" href="/brand/favicon-dark-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" media="(prefers-color-scheme: light)" href="/brand/favicon-16.png" />

    <link rel="manifest" href="/app.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="iPhoneRepasse" />
    <!-- black-translucent renders content edge-to-edge under the status bar (iOS 26 Liquid Glass). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="iPhoneRepasse Pro — gestão de estoque, vendas, CRM e financeiro para lojas de iPhones." />
