<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <script id="crm-pwa-head-bootstrap">
      (function () {
        var isCrmHost = window.location.hostname === "crm.iphonerepasse.com.br";
        var isCrmHash = window.location.hash === "#/crmplus" || window.location.hash.indexOf("#/crmplus/") === 0;
        var brand = isCrmHost || isCrmHash
          ? {
              icon16: "/brand/crm/favicon-16.png",
              icon32: "/brand/crm/favicon-32.png",
              appleTouchIcon: "/brand/crm/apple-touch-icon.png",
              manifest: isCrmHost ? "/crm.webmanifest" : "/crmplus.webmanifest",
              themeColor: "#1d4ed8",
              appTitle: "CRM Plus | iPhoneRepasse",
              appName: "CRM Plus iPhoneRepasse",
              shortName: "CRM Plus"
            }
          : {
              icon16: "/brand/favicon-16.png",
              icon32: "/brand/favicon-32.png",
              appleTouchIcon: "/brand/apple-touch-icon.png",
              manifest: "/app.webmanifest",
              themeColor: "#f5f7fb",
              appTitle: "iPhoneRepasse Pro",
              appName: "iPhoneRepasse Pro",
              shortName: "iPhoneRepasse"
            };
        document.write(
          '<link id="app-favicon" rel="icon" type="image/png" sizes="32x32" href="' + brand.icon32 + '" />' +
          '<link rel="icon" type="image/png" sizes="32x32" href="' + brand.icon32 + '" />' +
          '<link rel="icon" type="image/png" sizes="16x16" href="' + brand.icon16 + '" />' +
          '<link rel="apple-touch-icon" sizes="180x180" href="' + brand.appleTouchIcon + '" />' +
          '<link rel="manifest" href="' + brand.manifest + '" />' +
          '<meta name="theme-color" content="' + brand.themeColor + '" />' +
          '<meta name="application-name" content="' + brand.appName + '" />' +
          '<meta name="apple-mobile-web-app-title" content="' + brand.shortName + '" />' +
          '<title>' + brand.appTitle + '</title>'
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- black-translucent renders content edge-to-edge under the status bar (iOS 26 Liquid Glass). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="iPhoneRepasse Pro — gestão de estoque, vendas, CRM e financeiro para lojas de iPhones." />
    <!-- Apple Splash Screens (iOS 26 / iPadOS 26). Generate via `node scripts/generate-ios-splash.mjs`. -->
    <!-- iPhone 16 Pro Max -->
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-pro-max_portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-pro-max_dark_portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPhone 16 Pro -->
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-pro_portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-pro_dark_portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPhone 16 Plus -->
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-plus_portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16-plus_dark_portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPhone 16 -->
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16_portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-16_dark_portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPhone SE -->
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-se_portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/iphone-se_dark_portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPad Pro 13" portrait -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-13_portrait.png" media="(device-width: 1032px) and (device-height: 1376px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-13_dark_portrait.png" media="(device-width: 1032px) and (device-height: 1376px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPad Pro 11" portrait -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-11_portrait.png" media="(device-width: 834px) and (device-height: 1210px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-11_dark_portrait.png" media="(device-width: 834px) and (device-height: 1210px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPad Air portrait -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-air_portrait.png" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-air_dark_portrait.png" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait) and (prefers-color-scheme: dark)" />
    <!-- iPad Pro 13" landscape -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-13_landscape.png" media="(device-width: 1376px) and (device-height: 1032px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-13_landscape_dark.png" media="(device-width: 1376px) and (device-height: 1032px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape) and (prefers-color-scheme: dark)" />
    <!-- iPad Pro 11" landscape -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-11_landscape.png" media="(device-width: 1210px) and (device-height: 834px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-pro-11_landscape_dark.png" media="(device-width: 1210px) and (device-height: 834px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape) and (prefers-color-scheme: dark)" />
    <!-- iPad Air landscape -->
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-air_landscape.png" media="(device-width: 1180px) and (device-height: 820px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)" />
    <link rel="apple-touch-startup-image" href="/brand/splash/ipad-air_landscape_dark.png" media="(device-width: 1180px) and (device-height: 820px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape) and (prefers-color-scheme: dark)" />
  </head>
  <body
    class="bg-surface-light-100 dark:bg-surface-dark-50 text-gray-900 dark:text-white"
  >
    <div id="root"></div>
    <!-- Print Container -->
    <div id="print-area" class="print-only"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
