<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    />
    <script id="theme-fowt-guard">
      // Aplica `.dark` ANTES do primeiro paint para eliminar o flash de tema
      // errado (FOWT). Espelha a lógica de resolução do ThemeContext: preferência
      // salva ('light' | 'dark' | 'system') com fallback para o sistema.
      (function () {
        try {
          var saved = localStorage.getItem("iphonerepasse-theme");
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = saved === "dark" || ((saved === "system" || !saved) && systemDark);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage indisponível (modo privado): cai no tema claro padrão. */
        }
      })();
    </script>
    <script id="crm-pwa-head-bootstrap">
      (function () {
        var isCrmHost = window.location.hostname === "crm.iphonerepasse.com.br";
        var isCrmHash = window.location.hash === "#/crmplus" || window.location.hash.indexOf("#/crmplus/") === 0;
        var isDark = document.documentElement.classList.contains("dark");
        // theme-color resolvido pelo tema ativo, para a status bar / splash do PWA
        // não piscarem claro quando o usuário está no escuro.
        var appThemeColor = isDark ? "#0b1220" : "#f5f7fb";
        var brand = isCrmHost || isCrmHash
          ? {
              icon16: "/brand/crm/favicon-16.png",
              icon32: "/brand/crm/favicon-32.png",
              appleTouchIcon: "/brand/crm/apple-touch-icon.png",
              manifest: isCrmHost ? "/crm.webmanifest" : "/crmplus.webmanifest",
              themeColor: "#1d4ed8",
              // CRM Plus também tem dark mode (`.dark .crm-plus-theme`) e o topo
              // usa o mesmo `--ds-color-bg` (claro/`#0b1220`). Mesma regra do ERP:
              // dark → `black` (faixa opaca escura), light → `default`. É o único
              // ponto que seta este meta no CRM (runtimeBranding não o toca e o
              // syncBrowserBrand faz early-return para o CRM).
              statusBarStyle: isDark ? "black" : "default",
              appTitle: "CRM Plus | iPhoneRepasse",
              appName: "CRM Plus iPhoneRepasse",
              shortName: "CRM Plus"
            }
          : {
              icon16: "/brand/favicon-16.png",
              icon32: "/brand/favicon-32.png",
              appleTouchIcon: "/brand/apple-touch-icon.png",
              manifest: "/app.webmanifest",
              themeColor: appThemeColor,
              // No escuro a status bar do PWA standalone precisa ser opaca e
              // escura (`black`, glifos brancos). `default` é CLARO fixo e
              // ignora theme-color → faixa clara no topo no dark mode. `black`
              // mantém o conteúdo fora da status bar (sem reintroduzir a faixa
              // morta do rodapé que o black-translucent causa).
              statusBarStyle: isDark ? "black" : "default",
              appTitle: "iPhoneRepasse Pro",
              appName: "iPhoneRepasse Pro",
              shortName: "iPhoneRepasse"
            };
        document.write(
          '<link id="app-favicon" rel="icon" type="image/png" sizes="32x32" href="' + brand.icon32 + '" />' +
          '<link rel="icon" type="image/png" sizes="32x32" href="' + brand.icon32 + '" />' +
          '<link rel="icon" type="image/png" sizes="16x16" href="' + brand.icon16 + '" />' +
          '<link rel="apple-touch-icon" sizes="180x180" href="' + brand.appleTouchIcon + '" />' +
          '<link rel="manifest" href="' + brand.manifest + '" />' +
          '<meta name="theme-color" content="' + brand.themeColor + '" />' +
          '<meta name="apple-mobile-web-app-status-bar-style" content="' + brand.statusBarStyle + '" />' +
          '<meta name="application-name" content="' + brand.appName + '" />' +
          '<meta name="apple-mobile-web-app-title" content="' + brand.shortName + '" />' +
          '<title>' + brand.appTitle + '</title>'
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      `apple-mobile-web-app-status-bar-style` é emitido dinamicamente pelo
      bootstrap acima (light → `default`, dark → `black`), pois o iOS só lê este
      meta no LAUNCH do standalone e ele NÃO segue `theme-color`/dark mode.

      Por que não `black-translucent`: em PWA standalone com Dynamic Island, o
      black-translucent desloca o conteúdo pra cima pela altura da status bar e
      deixa uma faixa cinza morta de igual tamanho no FUNDO físico (o layout
      viewport vira `screen.height − safe-area-inset-top`, e nenhum elemento
      position:fixed consegue PINTAR abaixo dele — medido ao vivo num 16 Pro Max:
      inner=894, screen=956, faixa=62). Com `default`/`black` o conteúdo não entra
      sob a status bar, o viewport é posicionado corretamente e alcança o fundo
      físico, e env(safe-area-inset-top) passa a 0. Trade-off: a área da status
      bar fica com fundo sólido (claro no light, preto no dark — não navy puro).
    -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="iPhoneRepasse Pro — gestão de estoque, vendas, CRM e financeiro para lojas de iPhones." />
