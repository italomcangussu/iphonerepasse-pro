<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d4ed8" />
    <title>Sem conexão — CRM Plus</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/crm/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/crm/apple-touch-icon.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem max(1.5rem, env(safe-area-inset-bottom));
        background: #eff6ff;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Manrope", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: min(100%, 22rem);
        padding: 2rem 1.5rem;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 22px;
        background: #fff;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1rem;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: #1d4ed8;
        color: #fff;
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.125rem; font-weight: 800; }
      p { margin: 0 0 1.5rem; color: #475569; font-size: 0.875rem; line-height: 1.5; }
      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 999px;
        background: #1d4ed8;
        color: #fff;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f8fafc; }
        .card { background: #0f172a; border-color: rgba(148, 163, 184, 0.2); }
        p { color: #cbd5e1; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <h1>CRM Plus está offline</h1>
      <p>Conecte-se à internet para voltar às conversas, leads e notificações em tempo real.</p>
      <button type="button" onclick="location.reload()">Tentar novamente</button>
    </main>
    <script>
      window.addEventListener("online", function () { location.reload(); });
    </script>
  </body>
</html>
